.container {
    background: rgba(0, 0, 0, 0.85);
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 0, 0, 0.3);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
}

h1, h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #ff2b2b;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1a1a1a;
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    background: #ff2b2b;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

#resultado {
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: 0.4s ease;
    margin-top: 20px;
    padding: 15px;
    background: rgba(20, 20, 20, 0.9);
    border-radius: 8px;
    font-size: 13px;
    border-left: 4px solid #ff2b2b;
}

#resultado p:last-child {
    color: #00e676;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>💰 Calculadora</h1>
    <h2>(Parceria)</h2>

    <input type="number" id="valor" placeholder="Valor">

    <select id="firma">
        <option value="Nucentes">Nucentes (35%)</option>
        <option value="Umbrella">Umbrella (30%)</option>
        <option value="Neverpure">Neverpure (35%)</option>
        <option value="La Firma">La Firma (30%)</option>
        <option value="Nova Ordem">Nova Ordem (30%)</option>
        <option value="Nex7">Nex7 (35%)</option>
        <option value="Tequila">Tequila (30%)</option>
        <option value="Hp ilegal">Hp ilegal (30%)</option>
    </select>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
</div>

<script>
function calcular() {
    let valor = parseFloat(document.getElementById("valor").value);
    let firmaSelecionada = document.getElementById("firma").value;

    let firmas = {
        "Nucentes": 25,
        "Umbrella": 20,
        "Neverpure": 25,
        "La Firma": 20,
        "Nova Ordem": 20,
        "Nex7": 25,
        "Tequila": 20,
        "Hp ilegal": 20,
    };

    let taxaEmpresa = firmas[firmaSelecionada];
    let valorLucro = valor * (taxaEmpresa / 100);
    let valorFinal = valor - (valorLucro + (valor * 0.10));

    let formatar = (v) => v.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
    });

    let resultadoDiv = document.getElementById("resultado");

    resultadoDiv.innerHTML = `
        <p><strong>Valor total:</strong><br>${formatar(valor)}</p>
        <p><strong>Valor de lucro (${taxaEmpresa}%):</strong><br>${formatar(valorLucro)}</p>
        <p><strong>Valor a ser devolvido para o cliente:</strong><br>${formatar(valorFinal)}</p>
    `;

    resultadoDiv.style.opacity = "1";
    resultadoDiv.style.maxHeight = "500px";
}
</script>

</body>
</html>
